name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday midnight UTC — catches link rot even on idle repos
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude-path .git
            --exclude 'github\.com/shi275773124/Falsify'
            --exclude 'img\.shields\.io'
            --exclude 'yourdomain'
            --exclude 'example\.com'
            --accept '200,206,301,302,403,429'
            --max-retries 2
            --timeout 30
            './**/*.md'
          # Don't fail the build on transient link issues — annotations show problems
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
